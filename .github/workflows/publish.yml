name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual publish)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      package:
        description: 'Which package to publish'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'mpegts-vue3'
          - 'mpegts-react'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build mpegts-vue3
        if: github.event.inputs.package == 'all' || github.event.inputs.package == 'mpegts-vue3' || github.event_name == 'push'
        run: pnpm run build
        working-directory: packages/player

      - name: Build mpegts-react
        if: github.event.inputs.package == 'all' || github.event.inputs.package == 'mpegts-react' || github.event_name == 'push'
        run: pnpm run build
        working-directory: packages/react-player

      - name: Publish mpegts-vue3
        if: (github.event.inputs.package == 'all' || github.event.inputs.package == 'mpegts-vue3' || github.event_name == 'push') && github.event.inputs.dry_run != 'true'
        run: npm publish --access public --provenance
        working-directory: packages/player
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish mpegts-react
        if: (github.event.inputs.package == 'all' || github.event.inputs.package == 'mpegts-react' || github.event_name == 'push') && github.event.inputs.dry_run != 'true'
        run: npm publish --access public --provenance
        working-directory: packages/react-player
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run publish mpegts-vue3
        if: github.event.inputs.dry_run == 'true' && (github.event.inputs.package == 'all' || github.event.inputs.package == 'mpegts-vue3')
        run: npm publish --access public --provenance --dry-run
        working-directory: packages/player
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run publish mpegts-react
        if: github.event.inputs.dry_run == 'true' && (github.event.inputs.package == 'all' || github.event.inputs.package == 'mpegts-react')
        run: npm publish --access public --provenance --dry-run
        working-directory: packages/react-player
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
